<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PACT Digital Business Cards</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #222;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 20px;
      text-align: center;
    }
    h1 {
      margin-bottom: 10px;
    }
    p {
      margin-bottom: 30px;
      color: #555;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }
    .card {
      background: white;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }
    .card img {
      width: 100%;
      height: auto;
      border-radius: 10px;
    }
    .name {
      margin-top: 12px;
      font-weight: bold;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>PACT Digital Business Cards</h1>
    <p>Select a card to view and share.</p>

    <div class="cards">
      <div class="card">
        <img src="samah-al-gadi-business-card.png" alt="Samah Al Gadi business card">
        <div class="name">Samah Al Gadi</div>
      </div>

      <div class="card">
        <img src="mr-seifeldin-abbaro-business-card.png" alt="Mr. Seifeldin Abbaro business card">
        <div class="name">Mr. Seifeldin Abbaro</div>
      </div>

      <div class="card">
        <img src="dr-abdelatif-ijaimi-business-card.png" alt="Dr. Abdelatif Ijaimi business card">
        <div class="name">Dr. Abdelatif Ijaimi</div>
      </div>
    </div>
  </div>
</body>
</html>
